<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --text-muted: #8e8e93; 
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --dark-bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #636366;
        }

        /* Bloqueo de pantalla negra inicial */
        #safety-block {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: block;
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: background-color var(--transition);
        }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid rgba(0, 243, 255, 0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        body.light-mode .glass {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-kazuma { 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(0, 243, 255, 0.1); 
            color: var(--text-main); 
        }

        body.light-mode .input-kazuma { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); }
        .input-kazuma:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

        .btn-blue { background: var(--neon-blue); color: #000; font-weight: 900; transition: var(--transition); }
        .btn-blue:hover:not(:disabled) { background: #00cbd6; box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }
        .btn-blue:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .grecaptcha-badge { 
            width: 70px !important; overflow: hidden !important; transition: 0.3s !important;
            right: 0px !important; bottom: 20px !important; z-index: 9999 !important;
        }
        .grecaptcha-badge:hover { width: 256px !important; }

        header { background: rgba(12, 12, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
        body.light-mode header { background: rgba(255, 255, 255, 0.85); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="safety-block"></div>

    <header class="p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-xl tracking-tighter cursor-pointer uppercase" onclick="location.href='/dash'">
            KAZUMA <span style="color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 243, 255, 0.5)">DASH</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xl cursor-pointer" style="color: var(--neon-blue)" onclick="toggleTheme()" id="theme-btn">
                <i class="fas fa-moon"></i>
            </div>
            <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10 uppercase transition-all hover:bg-white/10" style="color: var(--neon-blue)">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <div class="glass rounded-[28px] p-8 mt-6 text-center relative overflow-hidden">
            <img id="view-img" src="https://files.catbox.moe/9ssbf9.jpg" class="mx-auto w-[120px] h-[120px] rounded-full border-3 border-[var(--neon-blue)] object-cover shadow-[0_0_25px_rgba(0,243,255,0.3)]" alt="Avatar">
            <h2 id="view-username" class="text-2xl font-black mt-4 uppercase tracking-wide">---</h2>
            <p id="view-id" class="text-slate-500 font-bold text-xs mt-1">---</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="glass p-5 rounded-2xl border-l-4 border-yellow-500" style="background: rgba(33, 33, 53, 0.2)">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1 tracking-wider">Plan Activo</p>
                <p id="view-plan" class="text-lg font-black text-yellow-500 uppercase">---</p>
            </div>
            <div class="glass p-5 rounded-2xl border-l-4 border-[var(--neon-blue)]" style="background: rgba(33, 33, 53, 0.2)">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1 tracking-wider">Límite Diario</p>
                <p id="view-requests" class="text-lg font-black text-cyan-400">0</p>
            </div>
        </div>

        <div class="glass rounded-[28px] p-6 mt-6">
            <p style="color: var(--neon-blue);" class="text-[11px] font-black uppercase mb-4 tracking-wider flex items-center gap-2">
                <i class="fas fa-key"></i> Configuración de credenciales
            </p>
            
            <div class="space-y-5">
                <div class="p-4 rounded-xl bg-black/40 border border-white/5">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-wider">Mi API Key Actual</label>
                    <div class="flex gap-2">
                        <input type="text" id="view-apikey" class="input-kazuma w-full p-3 rounded-xl font-mono text-xs tracking-wide" readonly>
                        <button onclick="copyKey()" class="btn-blue px-4 rounded-xl"><i class="fas fa-copy"></i></button>
                    </div>
                </div>

                <div class="p-4 rounded-xl bg-black/40 border border-white/5">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Personalizar API Key</label>
                        <span id="key-changes-badge" class="text-[10px] font-black bg-cyan-500/10 text-[var(--neon-blue)] px-2 py-0.5 rounded-md border border-[var(--neon-blue)]/20">---</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="custom-key-input" class="input-kazuma w-full p-3 rounded-xl font-mono text-xs tracking-wide" placeholder="Escribe tu nueva clave personalizada...">
                        <button id="btn-custom-key" onclick="updateCustomKey()" class="btn-blue px-4 rounded-xl text-[10px]">Guardar</button>
                    </div>
                    <p id="key-hint" class="text-[10px] text-slate-500 mt-2 font-medium"></p>
                </div>
            </div>
        </div>

        <div class="glass rounded-[28px] p-6 mt-6">
            <p style="color: var(--neon-blue);" class="text-[11px] font-black uppercase mb-4 tracking-wider flex items-center gap-2">
                <i class="fas fa-user-edit"></i> Ajustes de Perfil
            </p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-wider">Avatar (URL)</label>
                    <div class="flex gap-2">
                        <input type="text" id="new-img" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="URL directa de la imagen">
                        <button onclick="updateData('profile_img')" class="btn-blue px-4 rounded-xl text-[10px] uppercase font-black">Actualizar</button>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-wider">Nombre de Usuario</label>
                    <div class="flex gap-2">
                        <input type="text" id="new-username" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="Nuevo alias">
                        <button onclick="updateData('username')" class="btn-blue px-4 rounded-xl text-[10px] uppercase font-black">Actualizar</button>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-wider">Contraseña</label>
                    <div class="flex gap-2">
                        <input type="password" id="new-pass" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="••••••••">
                        <button onclick="updateData('password')" class="btn-blue px-4 rounded-xl text-[10px] uppercase font-black">Actualizar</button>
                    </div>
                </div>

                <div class="pt-4 mt-2 border-t border-white/5">
                    <button onclick="logout()" class="w-full bg-red-500/10 text-red-500 p-3.5 rounded-xl font-black uppercase text-[10px] border border-red-500/20 transition-all hover:bg-red-500/20">
                        <i class="fas fa-power-off mr-1"></i> Cerrar Sesión del Sistema
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) {
            window.location.href = '/login';
        } else {
            document.addEventListener("DOMContentLoaded", () => {
                setTimeout(() => {
                    document.getElementById('safety-block').style.display = 'none';
                }, 300);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            const icon = themeBtn.querySelector('i');
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            icon.classList.replace(isLight ? 'fa-moon' : 'fa-sun', isLight ? 'fa-sun' : 'fa-moon');
            localStorage.setItem('kazuma-theme', isLight ? 'light' : 'dark');
        }

        async function loadProfile() {
            if (localStorage.getItem('kazuma-theme') === 'light') toggleTheme();

            grecaptcha.ready(() => {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'profile_load'});
            });

            try {
                const res = await fetch(`/api/auth/me?apiKey=${userData.key}`);
                const result = await res.json();
                if (result.status) {
                    const u = result.data;
                    document.getElementById('view-username').innerText = u.username;
                    document.getElementById('view-id').innerText = u.email;
                    document.getElementById('view-apikey').value = u.key;
                    document.getElementById('view-requests').innerText = `${u.requests.today} / ${u.requests.limit}`;
                    document.getElementById('view-plan').innerText = u.plan;
                    if (u.profile_img) document.getElementById('view-img').src = u.profile_img;

                    // Lógica Dinámica de Control y Customización de Llaves
                    validarLimitePersonalizacionKey(u.plan, u.keyChangesRealizados || 0);
                }
            } catch (e) { 
                console.error("Error de red al sincronizar perfil"); 
            }
        }

        function validarLimitePersonalizacionKey(plan, realizados) {
            const planNormalizado = plan.toLowerCase();
            const inputCustom = document.getElementById('custom-key-input');
            const btnCustom = document.getElementById('btn-custom-key');
            const badgeChanges = document.getElementById('key-changes-badge');
            const hint = document.getElementById('key-hint');

            // Mapeo estricto según la Store del Servidor
            const limitesPlanes = {
                'free': 0,
                'basico': 2,
                'pro': 4,
                'empresarial': Infinity
            };

            const maximosCambios = limitesPlanes[planNormalizado] !== undefined ? limitesPlanes[planNormalizado] : 0;

            if (maximosCambios === 0) {
                // Plan Free o sin privilegios
                inputCustom.disabled = true;
                btnCustom.disabled = true;
                badgeChanges.innerText = "No disponible";
                badgeChanges.className = "text-[10px] font-black bg-red-500/10 text-red-400 px-2 py-0.5 rounded-md border border-red-500/20";
                hint.innerText = "⚠️ Tu plan actual no soporta la personalización de credenciales. Sube de nivel en la /shop.";
            } else if (maximosCambios === Infinity) {
                // Plan Élite Empresarial
                inputCustom.disabled = false;
                btnCustom.disabled = false;
                badgeChanges.innerText = "Cambios Infinitos";
                hint.innerText = "✨ Tienes acceso de nivel Élite. Puedes renombrar tu API Key cuantas veces quieras.";
            } else {
                // Planes con límites numéricos (Básico o Pro)
                const restantes = maximosCambios - realizados;
                badgeChanges.innerText = `Cambios: ${realizados} / ${maximosCambios}`;

                if (restantes <= 0) {
                    inputCustom.disabled = true;
                    btnCustom.disabled = true;
                    badgeChanges.className = "text-[10px] font-black bg-red-500/10 text-red-400 px-2 py-0.5 rounded-md border border-red-500/20";
                    hint.innerText = "❌ Has agotado el cupo de cambios asignados a tu plan mensual.";
                } else {
                    inputCustom.disabled = false;
                    btnCustom.disabled = false;
                    hint.innerText = `💡 Te quedan ${restantes} modificaciones disponibles para este período de facturación.`;
                }
            }
        }

        async function updateCustomKey() {
            const newKey = document.getElementById('custom-key-input').value.trim();
            if (!newKey) return;

            // Validación cliente básica antes de golpear el backend
            if (newKey.length < 4) {
                Swal.fire({ title: 'Error', text: 'La nueva clave debe tener al menos 4 caracteres.', icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)', confirmButtonColor: 'var(--neon-blue)' });
                return;
            }

            Swal.fire({
                title: 'Procesando Cambio',
                text: 'Reescribiendo firmas criptográficas en el servidor...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const res = await fetch(`/api/auth/custom-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: userData.key, newKey: newKey })
                });
                const data = await res.json();
                
                if (data.status) {
                    // Actualizamos la key local en la sesión para evitar deslogueo
                    userData.key = newKey;
                    localStorage.setItem('kazuma_user', JSON.stringify(userData));

                    Swal.fire({ 
                        title: '¡Clave Modificada!', 
                        text: 'Tu API Key personalizada se ha desplegado correctamente.', 
                        icon: 'success', 
                        background: 'var(--card-bg)', 
                        color: 'var(--text-main)',
                        confirmButtonColor: 'var(--neon-blue)'
                    }).then(() => location.reload());
                } else {
                    Swal.fire({ title: 'Operación Rechazada', text: data.message || 'Error al procesar el cambio.', icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)', confirmButtonColor: 'var(--neon-blue)' });
                }
            } catch (e) {
                Swal.fire({ title: 'Fallo de Red', text: 'No se pudo conectar con el endpoint de autenticación.', icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)', confirmButtonColor: 'var(--neon-blue)' });
            }
        }

        async function updateData(type) {
            const inputMap = { 'username': 'new-username', 'password': 'new-pass', 'profile_img': 'new-img' };
            const val = document.getElementById(inputMap[type]).value.trim();
            if (!val) return;

            try {
                const res = await fetch(`/api/auth/update-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: userData.key, type, value: val })
                });
                const data = await res.json();
                if (data.status) {
                    if (type !== 'password') {
                        userData[type === 'profile_img' ? 'profile_img' : type] = val;
                        localStorage.setItem('kazuma_user', JSON.stringify(userData));
                    }
                    Swal.fire({ title: 'Listo', text: 'Datos guardados', icon: 'success', background: 'var(--card-bg)', color: 'var(--text-main)', confirmButtonColor: 'var(--neon-blue)' }).then(() => location.reload());
                }
            } catch (e) { console.error("Error al actualizar"); }
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('view-apikey').value);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiada al portapapeles', showConfirmButton: false, timer: 1200, background: 'var(--card-bg)', color: 'var(--text-main)' });
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        window.onload = loadProfile;
    </script>
</body>
</html>
