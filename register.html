<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma API | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        :root { 
            --dark-bg: #090a0f; 
            --card-bg: #141622; 
            --input-bg: #1d2032;
            --neon-purple: #7c4dff; 
            --text-main: #ffffff;
            --text-muted: #7e84a3;
        }

        body { 
            background: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
        }

        #safety-overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
        }

        .login-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-kazuma { 
            background: var(--input-bg); 
            border: 2px solid transparent; 
            color: #ffffff !important; 
            transition: all 0.2s ease-in-out; 
        }

        .input-kazuma:focus { 
            border-color: var(--neon-purple); 
            background: rgba(29, 32, 50, 0.6);
        }

        .btn-purple { 
            background: var(--neon-purple); 
            transition: all 0.3s ease; 
            font-weight: 700; 
            color: #ffffff; 
        }
        .btn-purple:hover { 
            filter: brightness(1.1); 
            transform: translateY(-1px); 
            box-shadow: 0 8px 20px rgba(124, 77, 255, 0.3);
        }

        .btn-github-oauth {
            background: #1d2032;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
            font-weight: 700;
        }
        .btn-github-oauth:hover {
            background: #25293e;
            transform: translateY(-1px);
        }

        /* Contenedor optimizado para Turnstile */
        .turnstile-container { 
            display: flex; 
            justify-content: center; 
            margin: 20px 0; 
            min-height: 65px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="safety-overlay"></div>

    <div class="w-full max-w-md text-left mb-8 px-2 flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xs text-white uppercase bg-gradient-to-br from-indigo-600 to-purple-700 shadow-lg tracking-tighter">
            KURA
        </div>
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">Kazuma API <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-white/5 text-slate-400">v1.0</span></h1>
            <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">Crea una cuenta en la API</p>
        </div>
    </div>

    <div class="login-card p-8 rounded-3xl w-full max-w-md">
        <div class="mb-6">
            <h2 class="text-2xl font-bold tracking-tight text-white">Registro</h2>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-2">Nombre de usuario</label>
                <input type="text" id="username" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="Tu usuario de la API" required>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-400 mb-2">Correo electrónico</label>
                <input type="email" id="email" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <label class="block text-xs font-medium text-slate-400 mb-2">Contraseña</label>
                    <input type="password" id="password" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="••••" required>
                    <i class="fas fa-eye absolute right-4 top-[46px] cursor-pointer text-slate-500 hover:text-slate-300 transition" onclick="togglePassword('password', this)"></i>
                </div>
                <div class="relative">
                    <label class="block text-xs font-medium text-slate-400 mb-2">Confirmar</label>
                    <input type="password" id="confirmPassword" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="••••" required>
                    <i class="fas fa-eye absolute right-4 top-[46px] cursor-pointer text-slate-500 hover:text-slate-300 transition" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
            </div>

            <div class="flex items-center px-1">
                <label class="flex items-center gap-2 text-xs font-medium text-slate-400 cursor-pointer select-none">
                    <input type="checkbox" id="tos" class="accent-purple-500 w-4 h-4 rounded border-none bg-slate-800" required>
                    Acepto los <a href="/tos/terms" class="text-purple-400 hover:underline">términos y condiciones</a>
                </label>
            </div>

            <div class="turnstile-container">
                <div class="cf-turnstile" 
                     data-sitekey="0x4AAAAAADZQfgbHy1wLHtDG" 
                     data-theme="dark">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-purple w-full py-4 rounded-2xl text-sm shadow-lg">
                Registrar Cuenta
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-white/[0.03]"></div>
            <span class="flex-shrink mx-4 text-slate-500 text-[9px] font-bold tracking-widest uppercase">O REGÍSTRATE CON</span>
            <div class="flex-grow border-t border-white/[0.03]"></div>
        </div>

        <div class="w-full mb-6">
            <a href="https://rest.kazuma.giize.com/api/auth/github" class="btn-github-oauth w-full py-3.5 rounded-2xl flex items-center justify-center gap-3 text-sm shadow-md">
                <i class="fab fa-github text-lg"></i>
                GitHub
            </a>
        </div>

        <div class="flex flex-col gap-3 justify-center items-center text-xs font-medium border-t border-white/[0.03] pt-5 px-1">
            <p class="text-slate-400">¿Ya tienes cuenta? <a href="/login" class="text-purple-400 hover:underline">Inicia Sesión</a></p>
            <a href="mailto:pixelcrewteam@gmail.com" class="w-full py-3 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-2 transition bg-white/5 text-slate-400 hover:text-white border border-white/5 uppercase tracking-widest">
                <i class="fas fa-question-circle"></i> Necesitas Ayuda
            </a>
        </div>
    </div>

    <div class="mt-8 text-center">
        <a href="/terms" class="text-xs font-semibold text-slate-600 hover:text-slate-400 transition underline decoration-dotted">Condiciones del servicio</a>
    </div>

    <script>
        (async function initialCheck() {
            const user = localStorage.getItem('kazuma_user');
            if (user) {
                window.location.href = '/dash';
            } else {
                document.getElementById('safety-overlay').style.display = 'none';
            }
        })();

        // Función corregida: ahora maneja dinámicamente cualquier ID que le pases
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input) {
                input.type = input.type === "password" ? "text" : "password";
                el.classList.toggle("fa-eye");
                el.classList.toggle("fa-eye-slash");
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validación usando la API nativa de Turnstile
            const turnstileResponse = turnstile.getResponse();
            if (!turnstileResponse) {
                return Swal.fire({ title: 'Seguridad', text: 'Resuelve la verificación de Cloudflare', icon: 'warning', background: 'var(--card-bg)', color: 'var(--text-main)' });
            }

            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass !== confirm) {
                return Swal.fire({ title: 'Error', text: 'Las contraseñas no coinciden', icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)' });
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'Verifying...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: pass,
                        captcha: turnstileResponse // Token enviado al backend para verificación
                    })
                });

                const data = await res.json();

                if (data.status) {
                    Swal.fire({
                        title: 'REGISTRO EXITOSO',
                        html: `<p>Tu cuenta ha sido creada.</p><br><p style="color:var(--neon-purple); font-weight:bold; font-size:13px; font-family:monospace;">TU API KEY: ${data.key}</p>`,
                        icon: 'success',
                        background: 'var(--card-bg)',
                        color: 'var(--text-main)',
                        confirmButtonText: 'IR AL DASHBOARD',
                        confirmButtonColor: 'var(--neon-purple)'
                    }).then(() => {
                        document.getElementById('safety-overlay').style.display = 'block';
                        window.location.href = '/dash';
                    });
                } else {
                    Swal.fire({ title: 'Error', text: data.message, icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)' });
                    btn.disabled = false;
                    btn.innerText = 'Registrar Cuenta';
                    turnstile.reset(); // Reseteo nativo de Turnstile en fallos controlados
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerText = 'Registrar Cuenta';
                turnstile.reset(); // Reseteo nativo de Turnstile en excepciones
                Swal.fire({ title: 'Error', text: 'Fallo al conectar con el servidor', icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)' });
            }
        });
    </script>
</body>
</html>
