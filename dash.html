<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma API | Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --dark-bg: #090a0f; 
            --card-bg: #141622; 
            --input-bg: #1d2032;
            --neon-purple: #7c4dff; 
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --transition: 0.25s ease-in-out;
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .grecaptcha-badge { display: none !important; }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(124, 77, 255, 0.1); border-top: 3px solid var(--neon-purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { 
            background: #141622; 
            padding: 14px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container { 
            width: 100%; 
            padding: 20px; 
            box-sizing: border-box; 
            flex-grow: 1;
            max-width: 640px;
            margin: 0 auto;
        }

        .api-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.01); 
        }

        .stat-box { 
            background: var(--input-bg); 
            padding: 16px; 
            border-radius: 16px; 
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .key-box { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--input-bg); 
            padding: 16px; 
            border-radius: 16px; 
        }

        .user-card { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--input-bg); 
            padding: 14px 18px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
        }

        /* Sidebar hacia la Izquierda como Akirax */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: #11121c; border-right: 1px solid rgba(255,255,255,0.02); transition: var(--transition); z-index: 2000; padding: 30px 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 14px; color: #9ca3af; text-decoration: none; padding: 14px; border-radius: 14px; margin-bottom: 6px; font-weight: 500; font-size: 0.95rem; transition: var(--transition); cursor: pointer; }
        .sidebar-link:hover { background: var(--input-bg); color: #ffffff; }
        .sidebar-link i { width: 20px; text-align: center; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .kurayami-footer a:hover {
            background: rgba(124, 77, 255, 0.1) !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="header-left">
            <div onclick="toggleMenu()" style="font-size: 1.25rem; cursor: pointer; color: #9ca3af;"><i class="fas fa-bars"></i></div>
            <div class="brand-title">Panel</div>
        </div>
        <div class="header-right">
            <div class="flex items-center gap-1.5 bg-[#1d2032] px-3 py-1.5 rounded-full text-xs font-semibold text-slate-300">
                <i class="fas fa-wallet text-slate-400"></i>
                <span id="balance-display">0,00</span>
            </div>
            <div onclick="logout()" style="font-size: 1.1rem; cursor: pointer; color: #9ca3af;"><i class="fas fa-power-off"></i></div>
            <img id="top-avatar" src="https://files.catbox.moe/9ssbf9.jpg" class="header-avatar" onclick="window.location.href='/profile'">
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-8 h-8 rounded-xl bg-purple-600 flex items-center justify-center font-bold text-xs">AK</div>
            <span class="font-bold text-sm tracking-wide">Akirax presenta</span>
        </div>

        <div id="admin-nav" style="display:none;">
            <a href="/admin" class="sidebar-link text-purple-400"><i class="fas fa-user-shield"></i> Panel Admin</a>
        </div>

        <a href="/dash" class="sidebar-link"><i class="fas fa-th-large"></i> Panel</a>
        <a href="/profile" class="sidebar-link"><i class="fas fa-user"></i> Mi Perfil</a>
        
        <div class="border-t border-white/[0.03] my-4"></div>

        <a href="/endpoints/search" class="sidebar-link"><i class="fas fa-search"></i> Search</a>
        <a href="/endpoints/tools" class="sidebar-link"><i class="fas fa-tools"></i> Tools</a>
        <a href="/endpoints/download" class="sidebar-link"><i class="fas fa-download"></i> Downloads</a>
        <a href="/endpoints/ai" class="sidebar-link"><i class="fas fa-robot"></i> Inteligencia Artificial</a>
    </nav>

    <div class="container" id="content-area"></div>

    <div id="kurayami-footer-target" class="kurayami-footer"></div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        console.log("Environment Synced — Developed by Félix Ofc");

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login'; 
        }

        function copyKey() { 
            navigator.clipboard.writeText(userData.key); 
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado al portapapeles', showConfirmButton: false, timer: 1500, background: 'var(--card-bg)', color: 'var(--text-main)' }); 
        }

        function toggleEye() { 
            const el = document.getElementById('key-display'); 
            el.innerText = el.innerText.includes('••••') ? userData.key : '••••••••••••••••'; 
        }

        function updateUptime(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                if(document.getElementById('uptime-val')) document.getElementById('uptime-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadDash() {
            grecaptcha.ready(function() {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'dashboard_load'}).then(function(token) {});
            });

            const area = document.getElementById('content-area');
            const pre = document.getElementById('preloader');

            if (userData.role === 'admin') document.getElementById('admin-nav').style.display = 'block';

            try {
                const [resGlobal, resMe] = await Promise.all([
                    fetch('/api/auth/dashboard-global'),
                    fetch(`/api/auth/me?apiKey=${userData.key}`)
                ]);

                const data = await resGlobal.json();
                const me = await resMe.json();

                if (me.status) {
                    const updatedUser = { ...userData, ...me.data };
                    localStorage.setItem('kazuma_user', JSON.stringify(updatedUser));
                    document.getElementById('top-avatar').src = me.data?.profile_img || 'https://files.catbox.moe/9ssbf9.jpg';
                    // Sincroniza solicitudes o balance simulado en la cabecera
                    document.getElementById('balance-display').innerText = `${me.data?.requests.today || 0}`;
                }

                area.innerHTML = `
                <section class="mb-6 px-1">
                    <h1 class="text-2xl font-bold text-white tracking-tight">Anfitrión de Kazuma</h1>
                    <p class="text-xs font-medium text-slate-500 mt-1">Inicia session en tu cuenta de la API</p>
                </section>

                <div class="grid grid-template-columns: 1fr; gap: 14px; class="mb-4">
                    <div class="stat-box">
                        <div class="stat-icon bg-orange-500/10 text-orange-500"><i class="fas fa-users"></i></div>
                        <div>
                            <div class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Usuarios en Red</div>
                            <div class="text-xl font-bold text-white mt-0.5">${data.totalUsers} Usuarios</div>
                        </div>
                    </div>
                    
                    <div class="stat-box">
                        <div class="stat-icon bg-purple-500/10 text-purple-500"><i class="fas fa-clock"></i></div>
                        <div>
                            <div class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Server Uptime</div>
                            <div id="uptime-val" class="text-xl font-bold text-white mt-0.5">00:00:00</div>
                        </div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-icon bg-blue-500/10 text-blue-500"><i class="fas fa-chart-bar"></i></div>
                        <div>
                            <div class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Límite Diario</div>
                            <div class="text-xl font-bold text-white mt-0.5">${me.data?.requests.today || 0} / ${me.data?.requests.limit || 0}</div>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">Mi API Key</p>
                    <div class="key-box">
                        <span id="key-display" class="font-mono text-sm text-slate-300">••••••••••••••••</span>
                        <div class="flex gap-4">
                            <i class="fas fa-eye text-slate-500 cursor-pointer hover:text-slate-300 transition" onclick="toggleEye()"></i>
                            <i class="fas fa-copy text-purple-400 cursor-pointer hover:text-purple-300 transition" onclick="copyKey()"></i>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-wider">Top 5 usuarios</p>
                    ${data.top5.map((u, i) => `
                        <div class="user-card">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-lg bg-[#25293e] text-slate-300 flex items-center justify-center font-bold text-xs">
                                    ${u.username.charAt(0).toUpperCase()}
                                </div>
                                <span class="text-sm font-semibold text-slate-200">#${i+1} ${u.username}</span>
                            </div>
                            <span class="text-xs font-bold text-purple-400">${u.total} reqs</span>
                        </div>
                    `).join('')}
                </div>`;

                updateUptime(data.uptime);

                // Llamar el footer para que se inyecte exactamente como deseas
                document.getElementById('kurayami-footer-target').innerHTML = `
                <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.01); margin-top: auto;">
                    <p style="margin: 0;">
                        Copyright © 2021-2026 Akirax host. Todos los derechos reservados.
                    </p>
                    <p style="margin: 5px 0 0 0;">
                        Desarrollado por <a href="/theme/kurayami" style="color: var(--neon-purple); text-decoration: none; font-weight: 700;">CtrlPanel | Tema Phoenix</a>
                    </p>
                </footer>`;

            } catch (e) { 
                console.error(e);
                area.innerHTML = "<p style='text-align:center; color:var(--neon-purple); font-weight:bold; margin-top:50px;'>FALLO EN LA CONEXIÓN PROTOCOLO</p>"; 
            }

            setTimeout(() => { pre.style.display = 'none'; }, 400);
        }

        window.onload = loadDash;
    </script>
</body>
</html>
