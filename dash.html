<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma API | Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --dark-bg: #0d111a; 
            --card-bg: #161b26; 
            --sidebar-bg: #111520; 
            --input-bg: #1f2637;
            --text-main: #ffffff; 
            --text-muted: #8c96a8;
            --accent-purple: #7c4dff;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .grecaptcha-badge { 
            width: 70px !important; 
            overflow: hidden !important; 
            transition: all 0.3s ease !important;
            right: 0px !important; 
            bottom: 20px !important;
            z-index: 9999 !important;
        }
        .grecaptcha-badge:hover { width: 256px !important; }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.05); border-top: 3px solid var(--text-main); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { 
            background: var(--sidebar-bg); 
            padding: 14px 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .header-left { display: flex; align-items: center; gap: 18px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .brand-title { font-weight: 700; font-size: 1.2rem; }

        .balance-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .profile-banner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            background: #2a2f3d;
        }

        .container { 
            width: 100%; 
            padding: 24px 16px; 
            box-sizing: border-box; 
            flex-grow: 1;
            max-width: 540px;
            margin: 0 auto;
        }

        .hero-title-area { padding-bottom: 24px; }
        .hero-title-area h1 { font-size: 1.8rem; font-weight: 700; margin: 0; }
        .hero-title-area p { color: var(--text-muted); font-size: 0.95rem; margin: 6px 0 0 0; }

        .api-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 16px; 
        }

        .card-label {
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0 0 16px 0;
        }

        .stats-list {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .stat-item { 
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .stat-item:last-child { border-bottom: none; }

        .stat-icon {
            font-size: 1.2rem;
            color: var(--text-main);
            width: 24px;
            text-align: center;
        }

        .stat-content { display: flex; flex-direction: column; }
        .stat-name { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .stat-value { font-size: 1rem; font-weight: 600; margin-top: 2px; }

        .key-box { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--input-bg); 
            padding: 14px 16px; 
            border-radius: 8px; 
        }

        .user-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 4px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
        }
        .user-row:last-child { border-bottom: none; }

        /* Menú Lateral con apertura limpia desde la izquierda */
        .sidebar { position: fixed; top: 0; left: -100%; width: 80%; max-width: 280px; height: 100%; background: var(--sidebar-bg); transition: var(--transition); z-index: 2000; padding: 24px 16px; box-sizing: border-box; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        
        .sidebar-brand { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; padding-left: 8px; }
        
        .sidebar-link { display: flex; align-items: center; gap: 14px; color: #cbd5e1; text-decoration: none; padding: 12px 10px; border-radius: 8px; margin-bottom: 4px; font-weight: 500; font-size: 0.95rem; transition: var(--transition); cursor: pointer; }
        .sidebar-link:hover { background: rgba(255, 255, 255, 0.04); color: #ffffff; }
        .sidebar-link i { width: 20px; text-align: center; color: var(--text-muted); font-size: 1.05rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="header-left">
            <div onclick="toggleMenu()" style="font-size: 1.3rem; cursor: pointer;"><i class="fas fa-bars"></i></div>
            <div class="brand-title">Panel</div>
        </div>
        <div class="header-right">
            <div class="balance-box">
                <i class="fas fa-wallet" style="color: var(--text-muted); font-size: 0.85rem;"></i>
                <span id="balance-display">0</span>
            </div>
            <div onclick="logout()" style="font-size: 1.15rem; cursor: pointer; color: var(--text-muted); margin-left: 4px;"><i class="fas fa-power-off"></i></div>
            <img id="top-avatar" src="https://files.catbox.moe/9ssbf9.jpg" class="profile-banner" onclick="window.location.href='/profile'">
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">Kazuma presenta</div>

        <div id="admin-nav" style="display:none;">
            <a href="/admin" class="sidebar-link"><i class="fas fa-user-shield"></i> Panel Admin</a>
            <div style="height: 1px; background: rgba(255,255,255,0.04); margin: 12px 4px;"></div>
        </div>

        <a href="public/endpoints/search" class="sidebar-link"><i class="fas fa-search"></i> Search</a>
        <a href="public/endpoints/tools" class="sidebar-link"><i class="fas fa-tools"></i> Tools</a>
        <a href="public/endpoints/download" class="sidebar-link"><i class="fas fa-download"></i> Downloads</a>
        <a href="public/endpoints/ai" class="sidebar-link"><i class="fas fa-robot"></i> Inteligencia Artificial</a>
    </nav>

    <div class="container" id="content-area"></div>

    <div id="kurayami-footer-target" class="kurayami-footer"></div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login'; 
        }

        function copyKey() { 
            navigator.clipboard.writeText(userData.key); 
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado al Portapapeles', showConfirmButton: false, timer: 1500, background: 'var(--card-bg)', color: 'var(--text-main)' }); 
        }

        function toggleEye() { 
            const el = document.getElementById('key-display'); 
            el.innerText = el.innerText.includes('••••') ? userData.key : '••••••••••••••••'; 
        }

        function updateUptime(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                if(document.getElementById('uptime-val')) document.getElementById('uptime-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadDash() {
            grecaptcha.ready(function() {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'dashboard_load'}).then(function(token) {});
            });

            const area = document.getElementById('content-area');
            const pre = document.getElementById('preloader');

            if (userData.role === 'admin') document.getElementById('admin-nav').style.display = 'block';

            try {
                const [resGlobal, resMe, resFooter] = await Promise.all([
                    fetch('/api/auth/dashboard-global'),
                    fetch(`/api/auth/me?apiKey=${userData.key}`),
                    fetch('/partials/footer.html').then(res => res.ok ? res.text() : null).catch(() => null)
                ]);

                const data = await resGlobal.json();
                const me = await resMe.json();

                if (me.status) {
                    const updatedUser = { ...userData, ...me.data };
                    localStorage.setItem('kazuma_user', JSON.stringify(updatedUser));
                    document.getElementById('top-avatar').src = me.data?.profile_img || 'https://files.catbox.moe/9ssbf9.jpg';
                    document.getElementById('balance-display').innerText = `${me.data?.requests.today || 0}`;
                }

                area.innerHTML = `
                <div class="hero-title-area">
                    <h1>Anfitrión de Kazuma</h1>
                    <p>Inicia session en tu cuenta de la API</p>
                </div>

                <div class="stats-list">
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-content">
                            <span class="stat-name">Usuarios en Red</span>
                            <span class="stat-value">${data.totalUsers} Usuarios</span>
                        </div>
                    </div>
                    
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-content">
                            <span class="stat-name">Server Uptime</span>
                            <span id="uptime-val" class="stat-value">00:00:00</span>
                        </div>
                    </div>

                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-sliders"></i></div>
                        <div class="stat-content">
                            <span class="stat-name">Límite Diario</span>
                            <span class="stat-value">${me.data?.requests.today || 0} / ${me.data?.requests.limit || 0}</span>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="card-label">Mi API Key</p>
                    <div class="key-box">
                        <span id="key-display" style="font-family: monospace; font-size: 0.95rem; color: #e2e8f0;">••••••••••••••••</span>
                        <div style="display:flex; gap:16px; font-size: 1.05rem;">
                            <i class="fas fa-eye" onclick="toggleEye()" style="cursor:pointer; color: var(--text-muted);"></i>
                            <i class="fas fa-copy" onclick="copyKey()" style="cursor:pointer; color: #ffffff;"></i>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="card-label">Top 5 usuarios</p>
                    <div style="display: flex; flex-direction: column;">
                        ${data.top5.map((u, i) => `
                            <div class="user-row">
                                <span style="font-size:0.95rem; font-weight:500; color: #e2e8f0;">#${i+1} ${u.username}</span>
                                <span style="color: var(--text-muted); font-weight: 600; font-size:0.9rem;">${u.total} reqs</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;

                updateUptime(data.uptime);

                if (resFooter) {
                    document.getElementById('kurayami-footer-target').innerHTML = resFooter;
                }

            } catch (e) { 
                console.error("Error al cargar Dashboard:", e);
                area.innerHTML = "<p style='text-align:center; color:var(--text-muted); font-weight:bold; margin-top:50px;'>FALLO EN LA CONEXIÓN PROTOCOLO</p>"; 
            }

            setTimeout(() => { pre.style.display = 'none'; }, 350);
        }

        window.onload = loadDash;
    </script>
</body>
</html>
