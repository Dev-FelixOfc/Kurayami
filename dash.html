<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma API | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --dark-bg: #090a0f; 
            --card-bg: #141622; 
            --input-bg: #1d2032;
            --neon-purple: #7c4dff; 
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .grecaptcha-badge { 
            width: 70px !important; 
            overflow: hidden !important; 
            transition: all 0.3s ease !important;
            right: 0px !important; 
            bottom: 20px !important;
            z-index: 9999 !important;
        }
        .grecaptcha-badge:hover { width: 256px !important; }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(124, 77, 255, 0.1); border-top: 3px solid var(--neon-purple); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { 
            background: #141622; 
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .balance-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #d1d5db;
        }

        .profile-banner {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }
        .profile-banner:hover {
            border-color: var(--neon-purple);
            transform: scale(1.05);
        }

        .container { 
            width: 100%; 
            padding: 20px; 
            box-sizing: border-box; 
            flex-grow: 1;
            max-width: 600px;
            margin: 0 auto;
        }

        .dashboard-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 6px 0;
        }

        .dashboard-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 0 25px 0;
        }

        .api-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.02); 
        }

        .card-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 14px 0;
        }

        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box { 
            background: var(--card-bg); 
            padding: 18px; 
            border-radius: 20px; 
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stat-icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 2px;
        }

        .key-box { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--input-bg); 
            padding: 16px; 
            border-radius: 16px; 
        }

        .user-card { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--input-bg); 
            padding: 14px 18px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
        }

        /* Menú Lateral a la Izquierda */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: #0c0d14; border-right: 1px solid rgba(255,255,255,0.02); transition: var(--transition); z-index: 2000; padding: 30px 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 14px; color: #9ca3af; text-decoration: none; padding: 14px; border-radius: 14px; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; transition: var(--transition); cursor: pointer; }
        .sidebar-link:hover { background: var(--input-bg); color: #ffffff; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="header-left">
            <div onclick="toggleMenu()" style="font-size: 1.3rem; cursor: pointer; color: var(--text-muted);"><i class="fas fa-bars"></i></div>
            <div class="brand-title">Panel</div>
        </div>
        <div class="header-right">
            <div class="balance-box">
                <i class="fas fa-wallet" style="color: var(--text-muted);"></i>
                <span id="balance-display">0</span>
            </div>
            <div onclick="logout()" style="font-size: 1.1rem; cursor: pointer; color: var(--text-muted); margin-left: 4px;"><i class="fas fa-power-off"></i></div>
            <img id="top-avatar" src="https://files.catbox.moe/9ssbf9.jpg" class="profile-banner" onclick="window.location.href='/profile'">
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 4px;">
            <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;">Navegación</span>
            <i class="fas fa-times" onclick="toggleMenu()" style="font-size: 1.2rem; cursor: pointer; color: var(--text-muted);"></i>
        </div>

        <div id="admin-nav" style="display:none;">
            <a href="/admin" class="sidebar-link" style="color: var(--neon-purple);"><i class="fas fa-user-shield"></i> Panel Admin</a>
            <div style="height: 1px; background: rgba(255,255,255,0.03); margin: 10px 0;"></div>
        </div>

        <div class="sidebar-link" onclick="toggleMenu()"><i class="fas fa-th-large"></i> Dashboard</div>
        
        <div style="height: 1px; background: rgba(255,255,255,0.03); margin: 15px 0;"></div>

        <a href="/endpoints/search" class="sidebar-link"><i class="fas fa-search"></i> Search</a>
        <a href="/endpoints/tools" class="sidebar-link"><i class="fas fa-tools"></i> Tools</a>
        <a href="/endpoints/download" class="sidebar-link"><i class="fas fa-download"></i> Downloads</a>
        <a href="/endpoints/ai" class="sidebar-link"><i class="fas fa-robot"></i> Inteligencia Artificial</a>
    </nav>

    <div class="container" id="content-area"></div>

    <div id="kurayami-footer-target"></div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        console.log("System Synced Successfully");

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login'; 
        }

        function copyKey() { 
            navigator.clipboard.writeText(userData.key); 
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado al Portapapeles', showConfirmButton: false, timer: 1500, background: 'var(--card-bg)', color: 'var(--text-main)' }); 
        }

        function toggleEye() { 
            const el = document.getElementById('key-display'); 
            el.innerText = el.innerText.includes('••••') ? userData.key : '••••••••••••••••'; 
        }

        function updateUptime(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                if(document.getElementById('uptime-val')) document.getElementById('uptime-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadDash() {
            grecaptcha.ready(function() {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'dashboard_load'}).then(function(token) {});
            });

            const area = document.getElementById('content-area');
            const pre = document.getElementById('preloader');

            if (userData.role === 'admin') document.getElementById('admin-nav').style.display = 'block';

            try {
                const [resGlobal, resMe, resFooter] = await Promise.all([
                    fetch('/api/auth/dashboard-global'),
                    fetch(`/api/auth/me?apiKey=${userData.key}`),
                    fetch('/partials/footer.html').then(res => res.ok ? res.text() : null).catch(() => null)
                ]);

                const data = await resGlobal.json();
                const me = await resMe.json();

                if (me.status) {
                    const updatedUser = { ...userData, ...me.data };
                    localStorage.setItem('kazuma_user', JSON.stringify(updatedUser));
                    document.getElementById('top-avatar').src = me.data?.profile_img || 'https://files.catbox.moe/9ssbf9.jpg';
                    document.getElementById('balance-display').innerText = `${me.data?.requests.today || 0}`;
                }

                area.innerHTML = `
                <section style="padding: 10px 0 5px 0;">
                    <h1 class="dashboard-title">Anfitrión de Kazuma</h1>
                    <p class="dashboard-subtitle">Inicia sesión en tu cuenta de la API</p>
                </section>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-icon-wrapper"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <span class="stat-name">Usuarios en Red</span>
                            <span class="stat-value">${data.totalUsers} Usuarios</span>
                        </div>
                    </div>
                    
                    <div class="stat-box">
                        <div class="stat-icon-wrapper"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <span class="stat-name">Server Uptime</span>
                            <span id="uptime-val" class="stat-value">00:00:00</span>
                        </div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-icon-wrapper"><i class="fas fa-chart-bar"></i></div>
                        <div class="stat-info">
                            <span class="stat-name">Límite Diario</span>
                            <span class="stat-value">${me.data?.requests.today || 0} / ${me.data?.requests.limit || 0}</span>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="card-label">Mi API Key</p>
                    <div class="key-box">
                        <span id="key-display" style="font-family: monospace; font-size: 0.9rem; color: #e5e7eb;">••••••••••••••••</span>
                        <div style="display: flex; gap: 16px;">
                            <i class="fas fa-eye text-slate-500 style="cursor: pointer;" onclick="toggleEye()"></i>
                            <i class="fas fa-copy" style="color: var(--neon-purple); cursor: pointer;" onclick="copyKey()"></i>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="card-label">Top 5 usuarios</p>
                    ${data.top5.map((u, i) => `
                        <div class="user-card">
                            <span style="font-size: 0.95rem; font-weight: 600; color: #e5e7eb;">#${i+1} ${u.username}</span>
                            <span style="color: var(--neon-purple); font-weight: 700; font-size: 0.85rem;">${u.total} reqs</span>
                        </div>
                    `).join('')}
                </div>`;

                updateUptime(data.uptime);

                // Llamada exacta e inyección limpia de tu partial nativo
                if (resFooter) {
                    document.getElementById('kurayami-footer-target').innerHTML = resFooter;
                }

            } catch (e) { 
                console.error("Error al sincronizar paneles:", e);
                area.innerHTML = "<p style='text-align:center; color:var(--neon-purple); font-weight:bold; margin-top:50px;'>ERROR EN LA CARGA DEL PROTOCOLO</p>"; 
            }

            setTimeout(() => { pre.style.display = 'none'; }, 400);
        }

        window.onload = loadDash;
    </script>
</body>
</html>
