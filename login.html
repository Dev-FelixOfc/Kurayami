<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma API | Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root { 
            --dark-bg: #090a0f; 
            --card-bg: #141622; 
            --input-bg: #1d2032;
            --neon-purple: #7c4dff; 
            --text-main: #ffffff;
            --text-muted: #7e84a3;
        }

        body { 
            background: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
        }

        #safety-overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
        }

        .login-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-kazuma { 
            background: var(--input-bg); 
            border: 2px solid transparent; 
            color: #ffffff !important; 
            transition: all 0.2s ease-in-out; 
        }

        .input-kazuma:focus { 
            border-color: var(--neon-purple); 
            background: rgba(29, 32, 50, 0.6);
        }

        .btn-purple { 
            background: var(--neon-purple); 
            transition: all 0.3s ease; 
            font-weight: 700; 
            color: #ffffff; 
        }
        .btn-purple:hover { 
            filter: brightness(1.1); 
            transform: translateY(-1px); 
            box-shadow: 0 8px 20px rgba(124, 77, 255, 0.3);
        }

        .btn-github-oauth {
            background: #1d2032;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
            font-weight: 700;
        }
        .btn-github-oauth:hover {
            background: #25293e;
            transform: translateY(-1px);
        }

        .g-recaptcha { 
            display: flex; 
            justify-content: center; 
            margin: 20px 0; 
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="safety-overlay"></div>

    <div class="w-full max-w-md text-left mb-8 px-2 flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xs text-white uppercase bg-gradient-to-br from-indigo-600 to-purple-700 shadow-lg tracking-tighter">
            KURA
        </div>
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">Kazuma API <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-white/5 text-slate-400">v1.0</span></h1>
            <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">Inicia sesion en tu cuenta de la API</p>
        </div>
    </div>

    <div class="login-card p-8 rounded-3xl w-full max-w-md">
        <div class="mb-6">
            <h2 class="text-2xl font-bold tracking-tight text-white">Acceso</h2>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-2">Correo electrónico</label>
                <input type="email" id="email" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="Tu correo electrónico" required>
            </div>
            
            <div class="relative">
                <label class="block text-xs font-medium text-slate-400 mb-2">Contraseña</label>
                <input type="password" id="password" class="input-kazuma w-full rounded-2xl p-4 text-sm outline-none font-medium" placeholder="Tu contraseña" required>
                <i class="fas fa-eye absolute right-4 top-[46px] cursor-pointer text-slate-500 hover:text-slate-300 transition" onclick="togglePassword('password', this)"></i>
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center gap-2 text-xs font-medium text-slate-400 cursor-pointer select-none">
                    <input type="checkbox" class="accent-purple-500 w-4 h-4 rounded border-none bg-slate-800">
                    Acuérdate de mí
                </label>
            </div>

            <div class="g-recaptcha" data-sitekey="6Lcz9dwsAAAAAMJ3mdr0wYqws6j7eys_hNdMDKcj" data-theme="dark"></div>

            <button type="submit" id="btnSubmit" class="btn-purple w-full py-4 rounded-2xl text-sm shadow-lg">
                Acceso
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-white/[0.03]"></div>
            <span class="flex-shrink mx-4 text-slate-500 text-[9px] font-bold tracking-widest uppercase">O CONTINÚA CON</span>
            <div class="flex-grow border-t border-white/[0.03]"></div>
        </div>

        <div class="w-full mb-6">
            <a href="https://rest.kazuma.giize.com/api/auth/github" class="btn-github-oauth w-full py-3.5 rounded-2xl flex items-center justify-center gap-3 text-sm shadow-md">
                <i class="fab fa-github text-lg"></i>
                GitHub
            </a>
        </div>

        <div class="flex justify-center items-center text-xs font-medium border-t border-white/[0.03] pt-5 px-1">
            <a href="/register" class="text-purple-400 hover:underline">¿Nuevo en el protocolo? Crea tu cuenta</a>
        </div>
    </div>

    <div class="mt-8 text-center">
        <a href="/terms" class="text-xs font-semibold text-slate-600 hover:text-slate-400 transition underline decoration-dotted">Condiciones del servicio</a>
    </div>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        (async function initialCheck() {
            const cookieApiKey = getCookie('apiKey');

            if (cookieApiKey) {
                document.getElementById('safety-overlay').style.display = 'block';
                try {
                    const res = await fetch(`/api/auth/me?apiKey=${cookieApiKey}`);
                    const data = await res.json();
                    if (data.status) {
                        localStorage.setItem('kazuma_user', JSON.stringify(data.data));
                        document.cookie = "apiKey=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        window.location.href = '/dash';
                        return;
                    }
                } catch (e) {
                    document.getElementById('safety-overlay').style.display = 'none';
                }
            }

            const user = localStorage.getItem('kazuma_user');
            if (user) {
                window.location.href = '/dash';
            } else {
                document.getElementById('safety-overlay').style.display = 'none';
            }
        })();

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
            el.classList.toggle("fa-eye");
            el.classList.toggle("fa-eye-slash");
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const captchaResponse = grecaptcha.getResponse();
            if (!captchaResponse) {
                Swal.fire({ title: 'Seguridad', text: 'Resuelve el CAPTCHA', icon: 'warning', background: 'var(--card-bg)', color: 'var(--text-main)' });
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'Verifying...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        captcha: captchaResponse
                    })
                });

                const data = await res.json();
                if (data.status) {
                    localStorage.setItem('kazuma_user', JSON.stringify(data.data));
                    document.getElementById('safety-overlay').style.display = 'block';
                    window.location.href = '/dash';
                } else {
                    throw new Error(data.message || "Error de autenticación");
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: err.message, icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)' });
                btn.disabled = false;
                btn.innerText = 'Acceso';
                grecaptcha.reset();
            }
        });
    </script>
</body>
</html>
